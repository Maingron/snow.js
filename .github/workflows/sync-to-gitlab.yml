name: Sync to GitLab

on:
  push

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to GitLab
        uses: kujov/gitlab-sync@2.2.0
        with:
          gitlab_url: https://gitlab.com/Maingron/snow-js
          username: Maingron
          gitlab_pat: ${{ secrets.GITLAB_PAT }}
